---
layout: layout.html
---


<div class="container">
    <div class="grid grid-cols-3 gap-8">
        <div class="col-span-2">
            <div class="grid grid-cols-2 gap-8">
                <div class="bg-gray-200 h-96 rounded-xl"></div>
                <div class="bg-gray-200 h-96 rounded-xl"></div>  
                <div class="bg-gray-200 h-96 rounded-xl"></div>
                <div class="bg-gray-200 h-96 rounded-xl"></div>        
            </div>
        </div>
        <div class="h-96 rounded-xl p-2">
            <h3 class="text-2xl font-bold">Categories</h3>
            <ul class="my-8 p-4 bg-gray-200">
                <li class="text-xl font-semibold border-b-2 border-gray-700">Web dev</li>
                <li class="text-xl font-semibold border-b-2 border-gray-700">System Design</li>
                <li class="text-xl font-semibold border-b-2 border-gray-700">React</li>
                <li class="text-xl font-semibold border-b-2 border-gray-700">JavaScript</li>
            </ul>
        </div>
    </div>

    <h1 class="text-red-700 font-bold">Hwllo World</h1>
    {% for post in collections.posts %}
    <h3><a href="{{ post.url }}">{{ post.data.title }}</a></h3>
    {% endfor %}
</div>
